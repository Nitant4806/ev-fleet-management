services:

  db:
    image: postgres:17

    container_name: evfleet_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ev_fleet

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: evfleet_api

    ports:
      - "8000:8000"

    depends_on:
      - db

    env_file:
      - .env.docker

volumes:
  postgres_data: